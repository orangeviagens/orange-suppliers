<!DOCTYPE html> 
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orange · Gestão de Fornecedores</title>
<style>
:root{--font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;--font-mono:"SF Mono","Cascadia Code","Fira Code",Menlo,Consolas,monospace;--bg:#0a0a12;--surface:#10101a;--card:#151520;--card-hover:#1c1c2a;--border:#222236;--border-hover:#333350;--text:#e8e8f0;--muted:#7878a0;--park-bg:rgba(249,115,22,0.04);--park-border:rgba(249,115,22,0.12);--emissao:#f97316;--utilizacao:#22c55e;--pendente:#6b7280;--extranet:#14b8a6;--reseller:#ec4899;--b2b:#eab308;--restech:#3b82f6;--channel_manager:#a855f7;--danger:#ef4444;--warning:#f59e0b;--success:#22c55e;--info:#3b82f6}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;overflow-x:hidden}
.top-bar{display:flex;align-items:center;padding:16px 32px;border-bottom:1px solid var(--border);gap:24px;position:sticky;top:0;background:linear-gradient(180deg,var(--surface) 0%,var(--bg) 100%);z-index:50;backdrop-filter:blur(8px)}
.logo{font-size:20px;font-weight:800;letter-spacing:-1px}.logo span{color:var(--emissao)}
.nav-tabs{display:flex;gap:4px;margin-left:32px}
.nav-tab{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .2s;border:1px solid transparent;background:none}
.nav-tab:hover{color:var(--text);background:var(--card)}
.nav-tab.active{color:var(--emissao);background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.2)}
.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font-sans);display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--emissao) 0%,#e8650e 100%);color:#fff;box-shadow:0 2px 8px rgba(249,115,22,.25)}.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 12px rgba(249,115,22,.35)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--border-hover);color:var(--text)}
.btn-danger{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2)}.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-sm{padding:5px 10px;font-size:11px}
.view{display:none;padding:32px;max-width:1400px;margin:0 auto}.view.active{display:block;animation:fadeIn .3s ease}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.metric-card{background:linear-gradient(135deg,var(--card) 0%,var(--surface) 100%);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all .25s}
.metric-card:hover{border-color:var(--border-hover);transform:translateY(-2px)}
.metric-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:8px}
.metric-value{font-size:28px;font-weight:800;letter-spacing:-1px}
.metric-sub{font-size:11px;color:var(--muted);margin-top:4px}
.alert-card{border-left:3px solid var(--warning);background:rgba(245,158,11,.03)}
.alert-card.danger{border-left-color:var(--danger);background:rgba(239,68,68,.03)}
.layer-bars{display:flex;flex-direction:column;gap:8px;margin-top:24px}
.layer-bar{display:flex;align-items:center;gap:12px}
.layer-bar-label{font-size:12px;width:140px;color:var(--muted)}
.layer-bar-track{flex:1;height:24px;background:var(--card);border-radius:6px;overflow:hidden}
.layer-bar-fill{height:100%;border-radius:6px;transition:width .6s ease;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#fff;min-width:30px}
.list-toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.search-box{position:relative;flex:1;min-width:220px;max-width:400px}
.search-box input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px 10px 36px;font-size:13px;color:var(--text);font-family:var(--font-sans);outline:none;transition:border .2s}
.search-box input:focus{border-color:rgba(249,115,22,.35)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.chip{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 12px;cursor:pointer;font-size:11px;font-weight:500;transition:all .2s;user-select:none}
.chip:hover{border-color:var(--border-hover)}.chip.active{border-color:currentColor;background:rgba(255,255,255,.03)}
.chip .cdot{width:6px;height:6px;border-radius:50%}
.result-count{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
.s-table{width:100%;border-collapse:collapse;margin-top:16px}
.s-table th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}
.s-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid rgba(28,28,40,.5)}
.s-table tr{cursor:pointer;transition:background .15s}.s-table tbody tr:hover{background:var(--card)}
.tag{font-family:var(--font-mono);font-size:9px;padding:2px 7px;border-radius:4px;letter-spacing:.04em;font-weight:600}
.status-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:8px;box-shadow:0 0 6px currentColor}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:100;align-items:flex-start;justify-content:center;padding-top:60px;overflow-y:auto}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:92%;max-width:640px;animation:fadeUp .25s ease;margin-bottom:40px}
.modal-header{display:flex;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border);gap:12px}
.modal-header h2{font-size:16px;font-weight:700;flex:1}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px}.modal-close:hover{color:var(--text)}
.modal-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px}
.modal-tab{padding:12px 16px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.modal-tab:hover{color:var(--text)}.modal-tab.active{color:var(--emissao);border-bottom-color:var(--emissao)}
.modal-body{padding:24px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.form-row input,.form-row select,.form-row textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:var(--font-sans);outline:none;transition:border .2s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:rgba(249,115,22,.4)}
.form-row textarea{resize:vertical;min-height:60px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--border)}
.sub-list{margin-top:12px}
.sub-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.sub-item-info{flex:1}.sub-item-info .name{font-size:13px;font-weight:600}.sub-item-info .detail{font-size:11px;color:var(--muted);margin-top:2px}
.sub-actions{display:flex;gap:4px}
.timeline{margin-top:16px}
.timeline-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid rgba(28,28,40,.4)}
.timeline-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.timeline-content{flex:1}.timeline-action{font-size:13px;font-weight:500}.timeline-date{font-size:11px;color:var(--muted);margin-top:2px}
.timeline-changes{font-size:11px;color:var(--muted);margin-top:6px;background:var(--card);padding:8px 12px;border-radius:6px;font-family:var(--font-mono)}
.contract-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:16px;transition:all .2s}
.contract-card:hover{border-color:var(--border-hover)}
.contract-status{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.contract-info{flex:1}.contract-info .c-supplier{font-size:13px;font-weight:600}.contract-info .c-dates{font-size:11px;color:var(--muted);margin-top:2px}
.contract-badge{font-size:10px;padding:3px 10px;border-radius:99px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}.empty-state .icon{font-size:36px;margin-bottom:12px}.empty-state p{font-size:14px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;color:var(--text);z-index:200;animation:fadeUp .3s ease;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.success{border-color:var(--success)}.toast.error{border-color:var(--danger)}
.confirm-body{text-align:center;padding:32px 24px}.confirm-body p{font-size:14px;margin-bottom:20px;color:var(--muted)}.confirm-body .name{color:var(--text);font-weight:600}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){.top-bar{padding:12px 16px;flex-wrap:wrap}.nav-tabs{margin-left:0;width:100%}.view{padding:16px}.form-grid{grid-template-columns:1fr}.metrics{grid-template-columns:1fr 1fr}}

.s-table th.park-col,.s-table td.park-col{text-align:center;width:44px;padding:10px 4px;background:var(--park-bg)}
.s-table th.park-col{border-bottom:2px solid var(--park-border)}
.s-table td.park-col:first-of-type,.s-table th.park-col:first-of-type{border-left:1px solid var(--park-border)}
.s-table td.park-col:last-of-type,.s-table th.park-col:last-of-type{border-right:1px solid var(--park-border)}
.park-group-label{position:absolute;top:-1px;left:0;right:0;font-size:8px;letter-spacing:.12em;color:var(--emissao);opacity:.6;text-align:left;padding-left:2px}
.s-table th.park-col-first{padding-top:18px} 
.park-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.park-dot.on{background:var(--success);box-shadow:0 0 6px rgba(34,197,94,.4)}
.park-dot.off{background:var(--danger);opacity:.4}
.link-icon{color:var(--info);text-decoration:none;font-size:14px;opacity:.7;transition:opacity .2s}.supplier-link{color:var(--emissao);text-decoration:none;font-weight:600;transition:all .2s}.supplier-link:hover{text-decoration:underline;opacity:.85}.link-icon:hover{opacity:1}
.park-checks{display:flex;gap:16px;flex-wrap:wrap;padding:8px 0}
.park-check{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:600;user-select:none}
.park-check input[type="checkbox"]{accent-color:var(--success);width:16px;height:16px;cursor:pointer}
</style>
</head>
<body>
<div class="top-bar">
<div class="logo">Fornecedores <span>Orange</span></div>

</div>

<div id="view-audit" class="view"></div>
<div class="modal-bg" id="detailModal"><div class="modal"><div class="modal-header"><h2 id="detailTitle">Fornecedor</h2><button class="modal-close" onclick="closeModal('detailModal')">×</button></div><div class="modal-tabs" id="detailTabs"><div class="modal-tab active" onclick="switchDetailTab('info')">Informações</div><div class="modal-tab" onclick="switchDetailTab('contacts')">Contatos</div><div class="modal-tab" onclick="switchDetailTab('contracts')">Contratos</div><div class="modal-tab" onclick="switchDetailTab('history')">Histórico</div></div><div class="modal-body" id="detailBody"></div><div class="form-actions" id="detailActions"></div></div></div>
<div class="modal-bg" id="formModal"><div class="modal"><div class="modal-header"><h2 id="formTitle">Novo Fornecedor</h2><button class="modal-close" onclick="closeModal('formModal')">×</button></div><div class="modal-body"><div class="form-grid"><div class="form-row"><label>Nome</label><input type="text" id="fName"></div><div class="form-row"><label>Camada</label><select id="fLayer"><option value="emissao">Emissão</option><option value="utilizacao">Utilização</option><option value="pendente">Pendente</option><option value="extranet">Extranet</option><option value="reseller">Reseller</option><option value="b2b">B2B</option><option value="restech">ResTech</option><option value="channel_manager">Channel Manager</option></select></div><div class="form-row"><label>Status</label><select id="fStatus"><option value="true">Ativo</option><option value="false">Inativo</option></select></div></div><div class="form-grid"><div class="form-row"><label>Regra Faturamento</label><select id="fBilling"><option value="">Nenhuma</option><option value="emissão">Emissão</option><option value="utilização">Utilização</option><option value="crédito">Crédito</option><option value="pré-pago">Pré-pago</option></select></div><div class="form-row"><label>Website</label><input type="text" id="fWebsite" placeholder="https://..."></div></div><div class="form-grid"><div class="form-row"><label>Email Contato</label><input type="email" id="fEmail"></div><div class="form-row"><label>Telefone</label><input type="text" id="fPhone"></div></div><div class="form-row"><label>Parques</label><div class="park-checks"><label class="park-check"><input type="checkbox" id="fParkWDW"> WDW</label><label class="park-check"><input type="checkbox" id="fParkUS"> US</label><label class="park-check"><input type="checkbox" id="fParkSW"> SW</label><label class="park-check"><input type="checkbox" id="fParkDC"> DC</label><label class="park-check"><input type="checkbox" id="fParkUC"> UC</label><label class="park-check"><input type="checkbox" id="fParkDP"> DP</label></div></div>

<div class="modal-bg" id="contactModal"><div class="modal" style="max-width:460px"><div class="modal-header"><h2 id="contactFormTitle">Novo Contato</h2><button class="modal-close" onclick="closeModal('contactModal')">×</button></div><div class="modal-body"><div class="form-grid"><div class="form-row"><label>Nome</label><input type="text" id="cName"></div><div class="form-row"><label>Tipo</label><select id="cType"><option value="commercial">Comercial</option><option value="technical">Técnico</option><option value="billing">Faturamento</option><option value="general">Geral</option></select></div></div><div class="form-grid"><div class="form-row"><label>Email</label><input type="email" id="cEmail"></div><div class="form-row"><label>Telefone</label><input type="text" id="cPhone"></div></div><div class="form-row"><label>Cargo</label><input type="text" id="cPosition"></div><div class="form-row"><label>Notas</label><textarea id="cNotes"></textarea></div></div><div class="form-actions"><button class="btn btn-ghost" onclick="closeModal('contactModal')">Cancelar</button><button class="btn btn-primary" onclick="saveContact()">Salvar</button></div></div></div>

<script>
const SB='https://zrzkyiecsrohsioebner.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpyemt5aWVjc3JvaHNpb2VibmVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMzQ0NjgsImV4cCI6MjA4ODgxMDQ2OH0.mEzBxW8seWUz9t2VKQ2z5FxYKun9I0x8-s0W9VaUO9s';
const H={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation'};
const LAYERS=['emissao','utilizacao','pendente','extranet','reseller','b2b','restech','channel_manager']; const SUPPLIER_LAYERS=['emissao','utilizacao','pendente']; const PROSPECT_LAYERS=['extranet','reseller','b2b','restech','channel_manager'];
const PARKS=['park_wdw','park_us','park_sw','park_dc','park_uc','park_dp'];
const PARK_LABELS={park_wdw:'WDW',park_us:'US',park_sw:'SW',park_dc:'DC',park_uc:'UC',park_dp:'DP'};
const LN={emissao:'Emissão',utilizacao:'Utilização',pendente:'Pendente',extranet:'Extranet',reseller:'Reseller',b2b:'B2B',restech:'ResTech',channel_manager:'Channel Manager'};
const LC={emissao:'#f97316',utilizacao:'#22c55e',pendente:'#6b7280',extranet:'#14b8a6',reseller:'#ec4899',b2b:'#eab308',restech:'#3b82f6',channel_manager:'#a855f7'};
const SC={active:'#22c55e',pending:'#f59e0b',expiring_soon:'#f59e0b',expired:'#ef4444',suspended:'#6b7280',none:'#6b7280'};
const SN={active:'Ativo',pending:'Pendente',expiring_soon:'Vencendo',expired:'Vencido',suspended:'Suspenso',none:'Sem contrato'};
let S={suppliers:[],contracts:[],contacts:[],audit:[],filter:'all',filterP:'all',editingId:null,editingContactId:null,editingContractId:null,detailSupplier:null,_cSid:null,_ctSid:null};
async function api(p,o={}){const r=await fetch(SB+'/rest/v1/'+p,{headers:H,method:o.method||'GET',body:o.body?JSON.stringify(o.body):undefined});if(!r.ok)throw new Error(await r.text());const t=await r.text();return t?JSON.parse(t):null}
async function loadAll(){const[a,b,c,d]=await Promise.all([api('suppliers?select=*&order=name.asc'),api('contracts?select=*,suppliers(name,layer)&order=end_date.asc'),api('contacts?select=*&order=name.asc'),api('audit_log?select=*&order=changed_at.desc&limit=100')]);S.suppliers=a||[];S.contracts=b||[];S.contacts=c||[];S.audit=d||[];renderCurrentView()}
let CV='dashboard';

async function deleteContact(id){try{await api('contacts?id=eq.'+id,{method:'DELETE'});toast('Contato removido','success');await loadAll();if(S.detailSupplier)switchDetailTab('contacts')}catch(e){toast('Erro: '+e.message,'error')}}
function openNewContract(sid){S.editingContractId=null;S._ctSid=sid;document.getElementById('contractFormTitle').textContent='Novo Contrato';['ctType','ctNotes'].forEach(id=>document.getElementById(id).value='');['ctStart','ctEnd','ctRenewal'].forEach(id=>document.getElementById(id).value='');document.getElementById('ctStatus').value='active';openModal('contractModal')}
function editContract(id){const c=S.contracts.find(x=>x.id===id);if(!c)return;S.editingContractId=id;S._ctSid=c.supplier_id;document.getElementById('contractFormTitle').textContent='Editar Contrato';document.getElementById('ctStatus').value=c.status||'active';document.getElementById('ctType').value=c.contract_type||'';document.getElementById('ctStart').value=c.start_date||'';document.getElementById('ctEnd').value=c.end_date||'';document.getElementById('ctRenewal').value=c.renewal_date||'';document.getElementById('ctNotes').value=c.notes||'';openModal('contractModal')}
async function saveContract(){const b={supplier_id:S._ctSid,status:document.getElementById('ctStatus').value,contract_type:document.getElementById('ctType').value.trim()||null,start_date:document.getElementById('ctStart').value||null,end_date:document.getElementById('ctEnd').value||null,renewal_date:document.getElementById('ctRenewal').value||null,notes:document.getElementById('ctNotes').value.trim()||null};try{if(S.editingContractId){await api('contracts?id=eq.'+S.editingContractId,{method:'PATCH',body:b});toast('Contrato atualizado!','success')}else{await api('contracts',{method:'POST',body:b});toast('Contrato adicionado!','success')}closeModal('contractModal');await loadAll();if(S.detailSupplier)switchDetailTab('contracts')}catch(e){toast('Erro: '+e.message,'error')}}
async function deleteContract(id){try{await api('contracts?id=eq.'+id,{method:'DELETE'});toast('Contrato removido','success');await loadAll();if(S.detailSupplier)switchDetailTab('contracts')}catch(e){toast('Erro: '+e.message,'error')}}
function exportCSV(){let csv='Nome,Faturamento,WDW,US,SW,DC,UC,DP,Link Dashboard,Website,Email,Telefone,Status,Tags\n';S.suppliers.forEach(s=>{csv+='"'+s.name+'","'+(s.billing_rule||'')+'",'+'"'+(s.park_wdw?'Sim':'N\u00e3o')+'","'+(s.park_us?'Sim':'N\u00e3o')+'","'+(s.park_sw?'Sim':'N\u00e3o')+'","'+(s.park_dc?'Sim':'N\u00e3o')+'","'+(s.park_uc?'Sim':'N\u00e3o')+'","'+(s.park_dp?'Sim':'N\u00e3o')+'"'+',"'+(s.dashboard_link||'')+'","'+(s.website||'')+'","'+(s.contact_email||'')+'","'+(s.contact_phone||'')+'",'+(s.active?'Ativo':'Inativo')+',"'+((s.tags||[]).join('; '))+'"\n'});const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download='fornecedores-orange.csv';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);toast('CSV exportado!','success')}
function openModal(id){document.getElementById(id).classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}
document.querySelectorAll('.modal-bg').forEach(el=>{el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('show')})});
function toast(msg,type='success'){const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},2500)}
loadAll();
</script>
